name: Deploy to ECS

on:
  workflow_call:
    inputs:
      workflow-ref:
        type: string
        required: false
        default: main
        description: Branch, tag or commit used when calling the workflow. Required if calling the workflow from non default 'v1' tag.
      project-name:
        description: Project Name
        required: true
        type: string
      environment:
        description: Environment (staging/production/lab).
        required: true
        type: string
      build-number:
        description: Build Number/Tag
        required: true
        type: string
    secrets:
      datadog-api-key:
        description: DataDog API Key
        required: true

jobs:
  deploy:
    name: Update ECS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      BUILD_NUMBER: ${{ inputs.build-number }}
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      - name: Setup Deploy environment
        uses: ./cru-github-actions/actions/setup-env
        id: env
        with:
          project-name: ${{ inputs.project-name }}
          environment: ${{ inputs.environment }}

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      # Telemetry must never fail a deploy: pinned CLI major, --no-fail, and
      # continue-on-error guard against upstream CLI changes and Datadog outages.
      - name: Add DataDog Tags
        continue-on-error: true
        run: npx @datadog/datadog-ci@5 tag --level pipeline --no-fail --tags "service:$PROJECT_NAME" --tags "environment:$ENVIRONMENT" --tags "build_number:$BUILD_NUMBER"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::056154071827:role/GitHubDeployECS

      - name: Ensure Image Exists
        run: aws ecr describe-images --repository-name $PROJECT_NAME --image-ids imageTag=$ENVIRONMENT-$BUILD_NUMBER

      - name: Update and register Task Definition
        uses: ./cru-github-actions/actions/deploy-ecs

      - name: Record deployment event in Datadog
        continue-on-error: true
        run: |
          jq -n \
            --arg title "Deployed: $PROJECT_NAME $ENVIRONMENT-$BUILD_NUMBER" \
            --arg text "v1 pipeline deploy (started $DEPLOY_STARTED_AT)" \
            --arg service "$PROJECT_NAME" \
            --arg env "$ENVIRONMENT" \
            --arg rev "$ENVIRONMENT-$BUILD_NUMBER" \
            --arg bn "$BUILD_NUMBER" \
            '{title: $title, text: $text, alert_type: "info",
              aggregation_key: ("deploy:" + $service + ":" + $env),
              tags: ["source:cru-pipeline-v1", ("service:" + $service),
                     ("environment:" + $env), "action:deploy",
                     ("revision:" + $rev), ("build_number:" + $bn)]}' \
          | curl -fsS --retry 3 -X POST "https://api.datadoghq.com/api/v1/events" \
              -H "Content-Type: application/json" -H "DD-API-KEY: $DD_API_KEY" -d @-

      - run: echo "::notice title=Deploy Success::Successfully deployed - $PROJECT_NAME ($ENVIRONMENT-$BUILD_NUMBER)"
