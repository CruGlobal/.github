name: CI

# Lint, build and unit-test the action sources on every PR and on pushes to
# main. This is the gate that lets Dependabot PRs auto-merge with reasonable
# confidence that the actions still build and behave. Required status checks on
# the protected branch should require this workflow before merge.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.tool-versions'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
