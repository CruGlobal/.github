name: Rollback

# Roll production back to a previously promoted release. The release tag is
# resolved to its digest in the shared registry and redeployed to production.
#
# Multi-provider router (D9 pattern at job level): a `lookup` job runs the authz
# gate, the app-info fetch, and release-tag normalization, and outputs the
# provider + type + prod project-id + normalized release tag. Authz lives in
# `lookup`, which every provider job `needs`, so it ALWAYS passes before any
# provider job mutates production.
#
# NOTE: automatic "previous release" selection (roll back to release-<n-1>
# without naming it) lands in a later v2 pass; for now the target release is an
# explicit input.

on:
  workflow_call:
    inputs:
      workflow-ref:
        type: string
        required: false
        default: main
        description: Branch, tag or commit of CruGlobal/.github to check the actions out at.
      project-name:
        type: string
        required: true
        description: Project name (shared-registry repo/image).
      release:
        type: string
        required: true
        description: Release to roll back to, e.g. release-10012 or bare 10012.
    secrets:
      datadog-api-key:
        required: true
        description: DataDog API key.
      authz-token:
        required: true
        description: GitHub token used to verify the actor has push access to the app repo.

jobs:
  lookup:
    name: Authorize & look up app info
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.app-info.outputs.provider }}
      type: ${{ steps.app-info.outputs.type }}
      project-id: ${{ steps.app-info.outputs.project-id }}
      release-tag: ${{ steps.release.outputs.tag }}
    steps:
      # Authorization runs FIRST, before any provider job mutates production.
      # TODO: replace PAT with a dedicated GitHub App.
      - name: Authorize actor
        env:
          GH_TOKEN: ${{ secrets.authz-token }}
          ACTOR: ${{ github.actor }}
          APP_REPO: CruGlobal/${{ inputs.project-name }}
        run: |
          permission=$(gh api "repos/${APP_REPO}/collaborators/${ACTOR}/permission" --jq '.permission')
          echo "::notice::$ACTOR has '$permission' on $APP_REPO"
          case "$permission" in
            admin|write|maintain) ;;
            *)
              echo "::error::$ACTOR is not authorized to roll back $APP_REPO (permission: $permission). Requires admin, write, or maintain."
              exit 1
              ;;
          esac

      - name: Look up app info (production)
        id: app-info
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          V2_ENV: production
        run: |
          case "$V2_ENV" in
            release-candidate) legacy_env=staging ;;
            production) legacy_env=production ;;
            preview) legacy_env=lab ;;
            *) echo "::error::unknown v2 environment $V2_ENV"; exit 1 ;;
          esac
          info=$(curl -fsSL "https://93sm7cu7ne.execute-api.us-east-1.amazonaws.com/prod/info?project=${PROJECT_NAME}&environment=${legacy_env}")
          provider=$(echo "$info" | jq -r '.Provider')
          type=$(echo "$info" | jq -r '.Type // empty')
          project_id=$(echo "$info" | jq -r '.ProjectId // empty')
          case "$provider" in
            gcp|aws) ;;
            *) echo "::error::unsupported provider '$provider' for $PROJECT_NAME (expected gcp or aws)"; exit 1 ;;
          esac
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "type=$type" >> "$GITHUB_OUTPUT"
          echo "project-id=$project_id" >> "$GITHUB_OUTPUT"
          echo "::notice::app-info $PROJECT_NAME/$V2_ENV -> provider=$provider type=$type project=$project_id"

      # Accept either "release-10012" or a bare "10012" and normalize to a tag.
      - name: Normalize release tag
        id: release
        env:
          RELEASE: ${{ inputs.release }}
        run: |
          number="${RELEASE#release-}"
          if ! echo "$number" | grep -qE '^[0-9]+$'; then
            echo "::error::invalid release '$RELEASE'; expected 'release-<n>' or a bare '<n>'"
            exit 1
          fi
          echo "tag=release-$number" >> "$GITHUB_OUTPUT"

  rollback-gcp:
    name: Roll production back (Cloud Run)
    needs: lookup
    if: needs.lookup.outputs.provider == 'gcp'
    runs-on: ubuntu-latest
    # Shared production lock with promote: only one production mutation per app
    # at a time, and never cancelled mid-flight.
    concurrency:
      group: production-${{ inputs.project-name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
      ENVIRONMENT: production
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      - name: Configure GCP credentials (production SA)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: cru-deploy@${{ needs.lookup.outputs.project-id }}.iam.gserviceaccount.com

      - name: Resolve release image
        uses: ./cru-github-actions/actions/resolve-image
        id: resolve
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          mode: tag
          tag: ${{ needs.lookup.outputs.release-tag }}

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Deploy to production
        uses: ./cru-github-actions/actions/deploy
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          environment: production
          runtime-project: ${{ needs.lookup.outputs.project-id }}
          image: ${{ steps.resolve.outputs.image }}

      - name: Record deployment event in Datadog
        continue-on-error: true
        run: |
          jq -n \
            --arg title "Rolled back: $PROJECT_NAME to ${{ needs.lookup.outputs.release-tag }}" \
            --arg text "Pipeline v2 production rollback by ${{ github.actor }} (started $DEPLOY_STARTED_AT)" \
            --arg service "$PROJECT_NAME" \
            '{title: $title, text: $text, alert_type: "info",
              aggregation_key: ("deploy:" + $service + ":production"),
              tags: ["source:cru-pipeline-v2", ("service:" + $service),
                     "environment:production", "action:rollback",
                     "revision:${{ needs.lookup.outputs.release-tag }}", "rollback:true"]}' \
          | curl -fsS --retry 3 -X POST "https://api.datadoghq.com/api/v1/events" \
              -H "Content-Type: application/json" -H "DD-API-KEY: $DD_API_KEY" -d @-

      - run: echo "::notice title=Rolled Back::$PROJECT_NAME rolled back to ${{ needs.lookup.outputs.release-tag }} in production"

  rollback-aws:
    name: Roll production back (AWS)
    needs: lookup
    if: needs.lookup.outputs.provider == 'aws'
    runs-on: ubuntu-latest
    # Shared production lock with promote (same group as rollback-gcp).
    concurrency:
      group: production-${{ inputs.project-name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
      ENVIRONMENT: production
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      - name: Guard supported AWS type
        env:
          TYPE: ${{ needs.lookup.outputs.type }}
        run: |
          case "$TYPE" in
            ecs|lambda) ;;
            *) echo "::error::v2 AWS deploys support types 'ecs' and 'lambda' (got '$TYPE'); serverless lands in a later pass."; exit 1 ;;
          esac

      # One deploy role per type (GitHubDeployECS / GitHubDeployLambda), both
      # cru-deploy-scoped and covering the cruds account (056154071827).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::056154071827:role/${{ needs.lookup.outputs.type == 'lambda' && 'GitHubDeployLambda' || 'GitHubDeployECS' }}

      - name: Resolve release image
        uses: ./cru-github-actions/actions/resolve-image
        id: resolve
        with:
          type: ${{ needs.lookup.outputs.type }}
          project-name: ${{ inputs.project-name }}
          mode: tag
          tag: ${{ needs.lookup.outputs.release-tag }}

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Deploy to production
        uses: ./cru-github-actions/actions/deploy
        with:
          type: ${{ needs.lookup.outputs.type }}
          project-name: ${{ inputs.project-name }}
          environment: production
          image: ${{ steps.resolve.outputs.image }}

      - name: Record deployment event in Datadog
        continue-on-error: true
        run: |
          jq -n \
            --arg title "Rolled back: $PROJECT_NAME to ${{ needs.lookup.outputs.release-tag }}" \
            --arg text "Pipeline v2 production rollback by ${{ github.actor }} (started $DEPLOY_STARTED_AT)" \
            --arg service "$PROJECT_NAME" \
            '{title: $title, text: $text, alert_type: "info",
              aggregation_key: ("deploy:" + $service + ":production"),
              tags: ["source:cru-pipeline-v2", ("service:" + $service),
                     "environment:production", "action:rollback",
                     "revision:${{ needs.lookup.outputs.release-tag }}", "rollback:true"]}' \
          | curl -fsS --retry 3 -X POST "https://api.datadoghq.com/api/v1/events" \
              -H "Content-Type: application/json" -H "DD-API-KEY: $DD_API_KEY" -d @-

      - run: echo "::notice title=Rolled Back::$PROJECT_NAME rolled back to ${{ needs.lookup.outputs.release-tag }} in production"
