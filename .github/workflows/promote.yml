name: Promote

# Promote the artifact currently running in release-candidate to production.
# "Build once, promote the artifact": the exact digest running in release-
# candidate is deployed to production and tagged release-<yyyy-mm-dd>-<n> — the
# candidate tag's full suffix, build date + build number (no separate release
# counter — releases are traceable to their candidate for free; pre-D10
# candidates without a date yield release-<n>).
#
# Multi-provider router (D9 pattern at job level): a `lookup` job runs the authz
# gate + both app-info fetches (release-candidate and production) and outputs the
# provider + type + per-env project-ids. Authz lives in `lookup`, which every
# provider job `needs`, so it ALWAYS passes before any provider job mutates
# production. Provider jobs are gated on `needs.lookup.outputs.provider`.

on:
  workflow_call:
    inputs:
      workflow-ref:
        type: string
        required: false
        default: main
        description: Branch, tag or commit of CruGlobal/.github to check the actions out at.
      project-name:
        type: string
        required: true
        description: Project name (shared-registry repo/image).
    secrets:
      datadog-api-key:
        required: true
        description: DataDog API key.
      authz-token:
        required: true
        description: GitHub token used to verify the actor has push access to the app repo.

jobs:
  lookup:
    name: Authorize & look up app info
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.app-info-rc.outputs.provider }}
      type: ${{ steps.app-info-rc.outputs.type }}
      rc-project-id: ${{ steps.app-info-rc.outputs.project-id }}
      prod-project-id: ${{ steps.app-info-prod.outputs.project-id }}
    steps:
      # Authorization runs FIRST, before any provider job mutates production: the
      # human running a production change must have push-level access to the app
      # repo. TODO: replace PAT with a dedicated GitHub App.
      - name: Authorize actor
        env:
          GH_TOKEN: ${{ secrets.authz-token }}
          ACTOR: ${{ github.actor }}
          APP_REPO: CruGlobal/${{ inputs.project-name }}
        run: |
          permission=$(gh api "repos/${APP_REPO}/collaborators/${ACTOR}/permission" --jq '.permission')
          echo "::notice::$ACTOR has '$permission' on $APP_REPO"
          case "$permission" in
            admin|write|maintain) ;;
            *)
              echo "::error::$ACTOR is not authorized to promote $APP_REPO (permission: $permission). Requires admin, write, or maintain."
              exit 1
              ;;
          esac

      # app-info for BOTH environments: release-candidate (to read the running
      # candidate) and production (to deploy into). The v1 info service only knows
      # legacy env names, so translate first. Provider must be gcp or aws.
      - name: Look up app info (release-candidate)
        id: app-info-rc
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          V2_ENV: release-candidate
        run: |
          case "$V2_ENV" in
            release-candidate) legacy_env=staging ;;
            production) legacy_env=production ;;
            preview) legacy_env=lab ;;
            *) echo "::error::unknown v2 environment $V2_ENV"; exit 1 ;;
          esac
          info=$(curl -fsSL "https://93sm7cu7ne.execute-api.us-east-1.amazonaws.com/prod/info?project=${PROJECT_NAME}&environment=${legacy_env}")
          provider=$(echo "$info" | jq -r '.Provider')
          type=$(echo "$info" | jq -r '.Type // empty')
          project_id=$(echo "$info" | jq -r '.ProjectId // empty')
          case "$provider" in
            gcp|aws) ;;
            *) echo "::error::unsupported provider '$provider' for $PROJECT_NAME (expected gcp or aws)"; exit 1 ;;
          esac
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "type=$type" >> "$GITHUB_OUTPUT"
          echo "project-id=$project_id" >> "$GITHUB_OUTPUT"
          echo "::notice::app-info $PROJECT_NAME/$V2_ENV -> provider=$provider type=$type project=$project_id"

      - name: Look up app info (production)
        id: app-info-prod
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          V2_ENV: production
        run: |
          case "$V2_ENV" in
            release-candidate) legacy_env=staging ;;
            production) legacy_env=production ;;
            preview) legacy_env=lab ;;
            *) echo "::error::unknown v2 environment $V2_ENV"; exit 1 ;;
          esac
          info=$(curl -fsSL "https://93sm7cu7ne.execute-api.us-east-1.amazonaws.com/prod/info?project=${PROJECT_NAME}&environment=${legacy_env}")
          project_id=$(echo "$info" | jq -r '.ProjectId // empty')
          echo "project-id=$project_id" >> "$GITHUB_OUTPUT"
          echo "::notice::app-info $PROJECT_NAME/$V2_ENV -> project=$project_id"

  promote-gcp:
    name: Promote release-candidate to production (Cloud Run)
    needs: lookup
    if: needs.lookup.outputs.provider == 'gcp'
    runs-on: ubuntu-latest
    # Shared production lock with rollback: only one production mutation per app
    # at a time, and never cancelled mid-flight.
    concurrency:
      group: production-${{ inputs.project-name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      - name: Configure GCP credentials (release-candidate SA)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: cru-deploy@${{ needs.lookup.outputs.rc-project-id }}.iam.gserviceaccount.com

      - name: Resolve running release-candidate image
        uses: ./cru-github-actions/actions/resolve-image
        id: resolve
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          mode: environment
          environment: release-candidate
          runtime-project: ${{ needs.lookup.outputs.rc-project-id }}

      # Derive the release number from the candidate tag on the running digest.
      # Fails clearly if the running image was not deployed from a candidate.
      - name: Determine release number from candidate
        id: release
        env:
          TAGS: ${{ steps.resolve.outputs.tags }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          candidate=$(echo "$TAGS" | tr ',' '\n' | grep -E '^candidate-([0-9]{4}-[0-9]{2}-[0-9]{2}-)?[0-9]+$' | head -n1 || true)
          if [ -z "$candidate" ]; then
            echo "::error::the running release-candidate image (digest $DIGEST) has no candidate tag; cannot derive a release name. Deploy a candidate via deploy-candidate first."
            exit 1
          fi
          suffix="${candidate#candidate-}"
          echo "candidate=$candidate" >> "$GITHUB_OUTPUT"
          echo "release=release-$suffix" >> "$GITHUB_OUTPUT"

      - name: Configure GCP credentials (production SA)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: cru-deploy@${{ needs.lookup.outputs.prod-project-id }}.iam.gserviceaccount.com

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Deploy to production
        uses: ./cru-github-actions/actions/deploy
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          environment: production
          runtime-project: ${{ needs.lookup.outputs.prod-project-id }}
          image: ${{ steps.resolve.outputs.image }}

      # Tag the promoted digest release-<n> in the shared registry (the prod
      # cru-deploy SA holds AR writer there). Replaces the gcloud CLI tagging step
      # with the provider-agnostic tag-image action.
      - name: Tag digest as release
        uses: ./cru-github-actions/actions/tag-image
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          digest: ${{ steps.resolve.outputs.digest }}
          tag: ${{ steps.release.outputs.release }}

      - name: Record deployment event in Datadog
        continue-on-error: true
        run: |
          jq -n \
            --arg title "Promoted: $PROJECT_NAME ${{ steps.release.outputs.candidate }} -> ${{ steps.release.outputs.release }}" \
            --arg text "Pipeline v2 production promotion by ${{ github.actor }} (started $DEPLOY_STARTED_AT)" \
            --arg service "$PROJECT_NAME" \
            '{title: $title, text: $text, alert_type: "info",
              aggregation_key: ("deploy:" + $service + ":production"),
              tags: ["source:cru-pipeline-v2", ("service:" + $service),
                     "environment:production", "action:promote",
                     "revision:${{ steps.release.outputs.release }}", "candidate:${{ steps.release.outputs.candidate }}"]}' \
          | curl -fsS --retry 3 -X POST "https://api.datadoghq.com/api/v1/events" \
              -H "Content-Type: application/json" -H "DD-API-KEY: $DD_API_KEY" -d @-

      - run: echo "::notice title=Promoted::$PROJECT_NAME promoted ${{ steps.release.outputs.candidate }} -> ${{ steps.release.outputs.release }} in production"

  promote-aws:
    name: Promote release-candidate to production (AWS)
    needs: lookup
    if: needs.lookup.outputs.provider == 'aws'
    runs-on: ubuntu-latest
    # Shared production lock with rollback (same group as promote-gcp).
    concurrency:
      group: production-${{ inputs.project-name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      - name: Guard supported AWS type
        env:
          TYPE: ${{ needs.lookup.outputs.type }}
        run: |
          case "$TYPE" in
            ecs|lambda) ;;
            *) echo "::error::v2 AWS deploys support types 'ecs' and 'lambda' (got '$TYPE'); serverless lands in a later pass."; exit 1 ;;
          esac

      # One deploy role per type (GitHubDeployECS / GitHubDeployLambda) covers the
      # rc + prod clusters/functions, which share the cruds account (056154071827)
      # — no per-env re-auth needed. The chosen role also holds ecr:PutImage for
      # the release-<n> tag-image step below.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::056154071827:role/${{ needs.lookup.outputs.type == 'lambda' && 'GitHubDeployLambda' || 'GitHubDeployECS' }}

      - name: Resolve running release-candidate image
        uses: ./cru-github-actions/actions/resolve-image
        id: resolve
        with:
          type: ${{ needs.lookup.outputs.type }}
          project-name: ${{ inputs.project-name }}
          mode: environment
          environment: release-candidate

      - name: Determine release number from candidate
        id: release
        env:
          TAGS: ${{ steps.resolve.outputs.tags }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          candidate=$(echo "$TAGS" | tr ',' '\n' | grep -E '^candidate-([0-9]{4}-[0-9]{2}-[0-9]{2}-)?[0-9]+$' | head -n1 || true)
          if [ -z "$candidate" ]; then
            echo "::error::the running release-candidate image (digest $DIGEST) has no candidate tag; cannot derive a release name. Deploy a candidate via deploy-candidate first."
            exit 1
          fi
          suffix="${candidate#candidate-}"
          echo "candidate=$candidate" >> "$GITHUB_OUTPUT"
          echo "release=release-$suffix" >> "$GITHUB_OUTPUT"

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Deploy to production
        uses: ./cru-github-actions/actions/deploy
        with:
          type: ${{ needs.lookup.outputs.type }}
          project-name: ${{ inputs.project-name }}
          environment: production
          image: ${{ steps.resolve.outputs.image }}

      # Tag the promoted digest release-<n> in ECR (manifest re-tag; the ECR path
      # is shared by ecs and lambda). Requires ecr:PutImage on the deploy role
      # (GitHubDeployECS / GitHubDeployLambda) — see the tag-image comment / docs.
      - name: Tag digest as release
        uses: ./cru-github-actions/actions/tag-image
        with:
          type: ${{ needs.lookup.outputs.type }}
          project-name: ${{ inputs.project-name }}
          digest: ${{ steps.resolve.outputs.digest }}
          tag: ${{ steps.release.outputs.release }}

      - name: Record deployment event in Datadog
        continue-on-error: true
        run: |
          jq -n \
            --arg title "Promoted: $PROJECT_NAME ${{ steps.release.outputs.candidate }} -> ${{ steps.release.outputs.release }}" \
            --arg text "Pipeline v2 production promotion by ${{ github.actor }} (started $DEPLOY_STARTED_AT)" \
            --arg service "$PROJECT_NAME" \
            '{title: $title, text: $text, alert_type: "info",
              aggregation_key: ("deploy:" + $service + ":production"),
              tags: ["source:cru-pipeline-v2", ("service:" + $service),
                     "environment:production", "action:promote",
                     "revision:${{ steps.release.outputs.release }}", "candidate:${{ steps.release.outputs.candidate }}"]}' \
          | curl -fsS --retry 3 -X POST "https://api.datadoghq.com/api/v1/events" \
              -H "Content-Type: application/json" -H "DD-API-KEY: $DD_API_KEY" -d @-

      - run: echo "::notice title=Promoted::$PROJECT_NAME promoted ${{ steps.release.outputs.candidate }} -> ${{ steps.release.outputs.release }} in production"
