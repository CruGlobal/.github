name: Deploy Candidate

# Deploy a candidate artifact to the release-candidate environment. This path is
# automated by design (a merged change flows to release-candidate without a human
# gate), so there is NO authorization step here — unlike promote / rollback.

on:
  workflow_call:
    inputs:
      workflow-ref:
        type: string
        required: false
        default: main
        description: Branch, tag or commit of CruGlobal/.github to check the actions out at.
      project-name:
        type: string
        required: true
        description: Project name (shared-registry repo/image).
      tag:
        type: string
        required: true
        description: Candidate tag to deploy, e.g. candidate-10012.
    secrets:
      datadog-api-key:
        required: true
        description: DataDog API key.

jobs:
  deploy-candidate:
    name: Deploy Candidate to release-candidate
    runs-on: ubuntu-latest
    concurrency:
      group: release-candidate-${{ inputs.project-name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
      ENVIRONMENT: release-candidate
      DD_API_KEY: ${{ secrets.datadog-api-key }}
    steps:
      - name: Checkout Cru Actions & Workflows
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/.github
          ref: ${{ inputs.workflow-ref }}
          path: cru-github-actions

      # app-info: per-app metadata from the v1 info service. The service only
      # knows legacy environment names, so the v2 long name is translated first
      # (release-candidate -> staging). Provider must be gcp in this v2 pass.
      - name: Look up app info
        id: app-info
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          V2_ENV: release-candidate
        run: |
          case "$V2_ENV" in
            release-candidate) legacy_env=staging ;;
            production) legacy_env=production ;;
            preview) legacy_env=lab ;;
            *) echo "::error::unknown v2 environment $V2_ENV"; exit 1 ;;
          esac
          info=$(curl -fsSL "https://93sm7cu7ne.execute-api.us-east-1.amazonaws.com/prod/info?project=${PROJECT_NAME}&environment=${legacy_env}")
          provider=$(echo "$info" | jq -r '.Provider')
          project_id=$(echo "$info" | jq -r '.ProjectId')
          if [ "$provider" != "gcp" ]; then
            echo "::error::only cloudrun apps are supported in this v2 pass (provider=$provider for $PROJECT_NAME)"
            exit 1
          fi
          echo "project-id=$project_id" >> "$GITHUB_OUTPUT"
          echo "::notice::app-info $PROJECT_NAME/$V2_ENV -> provider=$provider project=$project_id"

      # Telemetry must never fail a deploy: pinned CLI major, --no-fail, and
      # continue-on-error guard against upstream CLI changes and Datadog outages.
      - name: Tag Datadog pipeline
        continue-on-error: true
        run: npx @datadog/datadog-ci@5 tag --level pipeline --no-fail --tags "service:$PROJECT_NAME" --tags "environment:$ENVIRONMENT" --tags "tag:${{ inputs.tag }}"

      - name: Configure GCP credentials
        uses: google-github-actions/auth@v3
        id: auth
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: cru-deploy@${{ steps.app-info.outputs.project-id }}.iam.gserviceaccount.com

      - name: Resolve candidate image
        uses: ./cru-github-actions/actions/resolve-image
        id: resolve
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          mode: tag
          tag: ${{ inputs.tag }}

      - name: Record deploy start
        run: echo "DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Deploy to release-candidate
        uses: ./cru-github-actions/actions/deploy
        with:
          type: cloudrun
          project-name: ${{ inputs.project-name }}
          environment: release-candidate
          runtime-project: ${{ steps.app-info.outputs.project-id }}
          image: ${{ steps.resolve.outputs.image }}

      - name: Record deployment in Datadog
        continue-on-error: true
        run: >-
          npx @datadog/datadog-ci@5 dora deployment
          --service "$PROJECT_NAME"
          --env "$ENVIRONMENT"
          --version "${{ inputs.tag }}"
          --started-at "$DEPLOY_STARTED_AT"
          --finished-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --skip-git
          --custom-tags "tag:${{ inputs.tag }}"

      - run: echo "::notice title=Candidate Deployed::$PROJECT_NAME ${{ inputs.tag }} -> release-candidate"
